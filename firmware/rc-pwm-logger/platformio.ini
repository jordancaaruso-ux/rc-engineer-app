; PlatformIO — RC PWM logger (ESP32-S3)
; Matches hardware spec: ESP32-S3-WROOM-1 class. Update board if your PCB uses a different module breakout.

[env:esp32-s3-rc-logger]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
